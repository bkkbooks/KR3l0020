body:
  text: 開元天寶遺事小説家類一雜事之屬提要臣等謹案開元天寶遺事四卷五代王仁裕撰仁裕字德輦天水人唐末為秦州節度判官後仕蜀為翰林學士唐莊宗平蜀復為秦州節度判官廢帝時以都官郎中充翰林學士晉髙祖時為諫議大夫漢髙祖時復為翰林學士承旨遷户部尚書罷為兵部尚書太子少保周顯德三年卒事迹具五代史雜傳朝公武讀書志曰蜀亡仁裕至鎬京採托民言得開元天寶遺事一百五十九條分為四卷洪邁容齋隨筆則以為托名仁裕摘其中舛謬者四事一為姚崇在武后時已為宰相而云開元初作翰林學士一為郭元振貶死後十年張嘉貞乃為宰相而云元振少時宰相張嘉貞納為壻一為張九齡去位十年楊國忠始得官而云九齡不肯及其門一為蘇頲為宰相時張九齡尚未逹而云九齡覽其文卷稱為文陳雄師所駁詰皆為確當然蘇軾集中有讀開元天寶遺事四絶句司馬光作通鑑亦採其中張彖指楊國忠為氷山語則其書實在二人以前非雲仙散録龍城録之流晚出於南宋者可比蓋委巷相傳語多失實仁裕採托於遺民之口不能證以國史是即其失必以為依託其名則事無顯證劉義慶世説新語劉孝標注往往摘其抵牾要不以是謂不出義慶手也故今仍從舊本題為仁裕撰焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a202c783f797d82842f8b277fe45a72b0ef91284aa14c71f71b1e6939103a069
