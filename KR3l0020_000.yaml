body:
  text: 開元天寳遺事小説家𩔖一雜事之屬提要臣等謹案開元天寳遺事四巻五代王仁裕撰仁裕字徳輦天水人唐末為秦州節度判官後仕蜀為翰林學士唐荘宗平蜀復為秦州節度判官廢帝時以都官郎中充翰林學士晉髙祖時為諫議大夫漢髙祖時復為翰林學士承㫖遷户部尚書罷為兵部尚書太子少保周顯德三年卒事迹具五代史襍傳晁公武讀書志曰蜀亡仁裕至鎬京採摭民言得開元天寳遺事一百五十九條分為四巻洪邁容齋隨筆則以為托名仁裕摘其中舛謬者四事一為姚崇在武后時已為宰相而云開元初作翰林學士一為郭元振貶死後十年張嘉貞乃為宰相而云元振少時宰相張嘉貞納為壻一為張九齡去位十年楊國忠始得官而云九齡不肯及其門一為蘇頲為宰相時張九齡尚未逹而云九齡覧其文巻稱為文陣雄師所駁詰皆為確當然蘇軾集中有讀開元天寳遺事四絶句司馬光作通鑑亦採其中張彖指楊國忠為氷山語則其書實在二人以前非雲仙㪚録龍城録之流晩出於南宋者可比葢委巷相傳語多失實仁裕採摭於遺民之口不能證以國史是即其失必以為依託其名則事無顯證劉義慶世説新語劉孝標註往往摘其牴牾要不以是謂不出義慶手也故今仍從舊本題為仁裕撰焉乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:af3ce520731bea197acb56c9b3e251108cdd40505f81cb94d8631d05fe5e889f
