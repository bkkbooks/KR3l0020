body:
  text: 開元天寶遺事卷四蜀王仁裕撰文帥明皇常謂侍臣曰張九齡文章自有唐名公皆弗如也朕終身師之不得其一二此人真文場之元帥也乞巧樓宫中以錦結成樓殿高百尺上可以勝數十人陳以瓜果酒炙設坐具以祀牛女二星嬪妃各以九孔針五色線向月穿之過者為得巧之候動清商之曲宴樂達旦士民之家皆效之吸花露貴妃每宿酒初消多苦肺熱嘗淩晨獨遊後苑傍花樹以手攀枝口吸花露藉其露液潤於肺也含玉嗛津貴妃素有肉體至夏苦熱常有肺渴每日含一玉魚兒於口中蓋藉其涼津沃肺也紅汗貴妃每至夏月常衣輕綃使侍兒交扇鼓風猶不解其熱每有汗出紅膩而多香或拭之於巾帕之上其色如桃紅也金函明皇憂勤國政諫無不從或有章疏規諷則探其理道優長者貯於金函中日置座右時取讀之未嘗懈怠也擊鑑救月長安城中每月蝕時士女即取鑑向月擊之滿郭如是蓋云救月蝕也歌直千金宫妓永新者善歌最受明皇寵愛每對御奏歌則絲竹之聲莫能遏帝嘗謂左右曰此女歌直千金肉腰刀李林甫妬賢嫉能不協羣議每奏御之際多所陷人衆謂林甫為肉腰刀又云林甫嘗以甘言誘人之過譛於上前時人皆言林甫甘言如蜜朝中相謂曰李公雖面有笑容而肚中鑄劒也人日憎怨異口同音隔障歌寧王宫有樂妓寵姐者美姿色善謳唱每宴外客其諸妓女盡在目前惟寵姐客莫能見飲及半酣詞客李太白恃醉戲曰白久聞王有寵姐善歌今酒殽醉飽羣公宴倦王何吝此女示於衆王笑謂左右曰設七寶花障召寵姐於障後歌之白起謝曰雖不許見面聞其聲亦幸矣樓車載樂楊國忠子弟恃后族之貴極於奢侈每遊春之際以大車結綵帛為樓載女樂數十人自私第聲樂前引出遊園苑中長安豪民貴族皆效之猧子亂局一日明皇與親王棋令賀懷智獨奏琵琶妃子立於局前觀之上欲輸次妃子將康國猧子放之令於局上亂其輸贏上甚悅焉決雲兒申王有高麗赤鷹岐王有北山黃鶻上甚愛之每弋獵必置之於駕前帝目之為決雲兒長湯十六所華清宫中除供奉兩湯外而别更有長湯十六所嬪御之類浴焉錦鴈奉御湯中以文瑶密石中央有玉蓮湯泉湧以成池又縫錦繡為鳬鴈於水中帝與貴妃施鈒鏤小舟戲玩於其間宫中退水出於金溝其中珠纓寶絡流出街渠貧民日有所得焉夜明枕虢國夫人有夜明枕設於堂中光照一室不假燈燭金雞障明皇每宴使祿山坐於御側以金雞障隔之百枝燈樹韓國夫人置百枝燈樹髙八十尺豎之髙山上元夜點之百里皆見光明奪月色也千炬燭圍楊國忠子弟每至上元夜各有千炬紅燭圍於左右有腳陽春宋璟愛民恤物朝野歸美人咸謂璟為有腳陽春言所至之處如陽春煦物也粲花之論李白有天才俊逸之譽與人談論皆成句讀如春葩麗藻粲於齒牙之下時人號曰李白粲花之論醉聖李白嗜酒不拘小節然沈酣中所撰文章未嘗錯誤而與不醉之人相對議事皆不出太白所見時人號為醉聖靈鵲報喜時人之家聞鵲聲者皆為喜兆故謂靈鵲報喜走丸之辨張九齡善談論每與賔客議論經旨滔滔不竭如下坂走丸也時人服其俊辨探春都人士女每至正月半後各乘車跨馬供帳於園圃或郊野中為探春之宴氷獸贈王公楊國忠子弟以姦媚結識朝士每至伏日取堅氷令工人鏤為鳳獸之形或飾以金環綵帶置之雕盤中送與王公大臣惟張九齡不受此惠嚼麝之談寧王驕貴極於奢侈每與賔客議論先含嚼沈麝方啓口發談香氣噴於席上醉語李林甫每與同僚議及公直之事則如癡醉之人未嘗問答或語及阿徇之事則響應如流張曲江嘗謂賔客曰李林甫議事如醉漢語也不足言暖玉鞍岐王有玉鞍一面每至冬月則用之雖天氣嚴寒而此鞍在上坐如溫火之氣百寶欄時楊國忠因貴妃專寵上賜以木芍藥數本植於家國忠以百寶粧飾欄楯雖帝宫之美不可及也四香閣國忠又用沈香為閣檀香為攔以麝香乳香篩土和為泥飾壁每於春時木芍藥盛開之際聚賔客於此閣上賞花焉禁中沈香之亭逺不侔此壯麗也任人如市瓜明皇召諸學士宴於便殿因酒酣顧謂李白曰我朝與天后之朝何如白曰天后朝政出多門國由姦幸任人之道如小兒市瓜不擇香味惟揀肥大者我朝任人如淘沙取金剖石採玉皆得其精粹明皇笑曰學士過有所飾雪刺滿頭宋璟求致仕表云臣竊祿簮裳備員廊廟霜毫生頷雪刺滿頭求退歸耕養慵巖穴樂生堯世死荷聖恩忍字光祿卿王守和未嘗與人有爭嘗於几案間大書忍字至於幃幌之屬以繡畫為之明皇知其姓字非時引對問曰卿名守和已知不爭好書忍字尤見用心奏曰臣聞堅而必剛剛則必折萬事之中忍字為上帝善賜帛以旌之風流陳明皇與貴妃每至酒酣使妃子統宫妓百餘人帝統小中貴百餘人排兩陳於掖庭中目為風流陳以霞帔錦被張之為旗幟攻擊相鬭敗者罰之巨觥以戲笑時議以為不祥之兆後果有祿山兵亂天意人事不偶然也望月臺玄宗八月十五日夜與貴妃臨太液池憑欄望月不盡帝意不快遂敕令左右於池西岸别築百尺髙臺與吾妃子來年望月後經祿山之亂不復置焉惟有基址而已竹義太液池岸有竹數十叢牙筍未嘗相離密密如栽也帝因與諸王間步於竹間帝謂諸王曰人世父子兄弟尚有離心離意此竹宗本不相疏人有生二心懷離間之意覩此可以為鑑諸親王皆唯唯帝呼為竹義美人呵筆李白於便殿對明皇撰詔誥時十月大寒凍筆莫能書字帝敕宫嬪十人侍於李白左右令執牙筆呵之遂取而書其詔其受聖眷如此開元天寶遺事卷四
