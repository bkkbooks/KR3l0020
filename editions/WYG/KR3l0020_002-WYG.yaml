body:
  text: 開元天寶遺事巻二蜀王仁裕撰警惡刀貴妃父楊𤣥琰少時嘗有一刀毎出入於道途間多佩此刀或前有惡獸盜賊則所佩之刀鏗然有聲似警於人也𤣥琰寶之夢中有孕楊國忠出使於江浙其妻思念至深荏苒成疾忽晝夢與國忠交因而有孕後生男名朏洎至國忠使歸其妻具述夢中之事國忠曰此蓋夫妻相念情感所致時人無不譏誚也金籠蟋蟀毎至秋時宮中妃妾軰皆以小金籠捉蟋蟀閉於籠中置之枕函畔夜聽其聲庶民之家皆效之也燭奴申王亦務奢侈盖時使之然毎夜宫中與諸王貴妃聚宴以龍檀木雕成燭跋童子衣以緑衣袍繫之束帶使執畫燭列立於宴席之側目為燭奴諸官貴戚之家皆效之醒醉草興慶池南岸有草數叢葉紫而心殷有一人醉過於草傍不覺失其酒態後有醉者摘草嗅之立然醒悟故目為醒醉草盆池魚明皇以李林甫為相後因召張九齡問可否九齡曰宰相之職四海具瞻若任人不當則國受其殃只如林甫為相然寵擢出宸衷臣恐他日之後禍延宗社帝意不悦忽一日帝曲宴近臣於禁苑中帝指示於九齡林甫曰檻前盆池中所養魚數頭鮮活可愛林甫曰賴陛下恩波所養九齡曰盆池之魚猶陛下任人他但能裝景致助兒女之戲爾帝甚不悦時人皆美九齡之忠直看花馬長安俠少毎至春時結朋聨黨各置矮馬飾以錦韀金􅛘並轡於花樹下往來使僕從執酒皿而隨之遇好囿則駐馬而飲香肌暖手岐王少惑女色毎至冬寒手冷不近於火惟於妙妓懷中揣其肌膚稱為暖手常日如是金衣公子明皇毎於禁苑中見黄鶯常呼之為金衣公子花裀學士許慎選放曠不拘小節多與親友結宴於花圃中未嘗具帷幄設坐具使童僕軰聚落花鋪於坐下慎選曰吾自有花裀何消坐具銷恨花明皇於禁苑中初有千葉桃盛開帝與貴妃日逐宴於樹下帝曰不獨萱草忘憂此花亦能銷恨醉輿申王毎醉即使宫妓將錦綵結一兜子令宫妓軰擡舁歸寢室本宫呼曰醉輿妓圍申王毎至冬月有風雪苦寒之際使宫妓密圍於坐側以御寒氣自呼為妓圍風流藪澤長安有平康坊妓女所居之地京都俠少萃集於此兼毎年新進士以紅牋名紙遊謁其中時人謂此坊為風流藪澤依氷山楊國忠權傾天下四方之士争詣其門進士張彖者陜州人也方學有文名志氣髙大未嘗干謁權貴或有勸􅂏令修謁國忠可圖顯榮􅂏曰爾軰以謂右相之勢倚靠如泰山以吾所見乃氷山也或皎日大明之際則此山當誤人爾後果如其言時人美張生見幾後年張生及第釋褐授華隂尉時縣令太守俱非其人多行不法張生有吏道勤於政事毎申舉之日則太守令尹抑而不從張生曰大丈夫有凌霄直上之志而拘於下位若立身於矮屋中使人擡頭不得遂拂衣長徃歸遯於嵩山禽擁行車李元紘開元初年為邑令賦役平允不嚴而治大有政聲遷潤州司馬出郊百里士民號泣遮路禽獸之𩔖飛擁行車有詔褒美之鏡影成相字宋璟未第時因於日中覽鏡見鏡中有影成一相字自此愈修相業後如其志知更雀裴耀卿勤於王政夜看案牘晝決獄訟常養一雀毎夜至初更時有聲至五更則急鳴耀卿呼為知更雀又于㕔前有一大桐樹至曉則有羣鳥翔集以此為出㕔之候故呼為報曉鳥時人美焉枯松再生明皇遭禄山之亂鑾輿西幸禁中枯松復生枝葉蔥蒨宛若新植者後肅宗平内難重興唐祚枯松再生祥不誣矣顛飲長安進士鄭愚劉参郭保衡王冲張道隐等十數軰不拘禮節旁若無人毎春時選妖妓三五人乘小犢車指名園曲沼藉草裸形去其巾帽叫笑喧呼自謂之顛飲選壻窻李林甫有女六人各有姿色雨露之家求之不允林甫㕔事壁間有一小窻飾以雜寶幔以絳紗常日使六女坐於窻中毎有貴家子弟入謁林甫即使女於窻中自選可意者事之四方神事姚元崇為宰相憂國如家愛民如子未嘗私於喜怒惟以忠孝為意四方之民皆畫元崇之真神事焉求之有福立有禍福盧奐為陜州刺史嚴毅之聲聞於關内𤣥宗幸京師次陜城頓知奐有神政御筆贊於㕔事曰專城之重分陜之雄仁雖惠愛性實謙冲亦既利物存乎匪躬斯為國寶不墜家聲尋除兵部侍郎陜州之民多有淫祀者州之士民相語曰不須賽神明不必求巫祝爾莫犯盧公立便有禍福移春檻楊國忠子弟毎春至之時求名花異木植於檻中以板為底以木為輪使人牽之自轉所至之處檻在目前而便即嘆賞目之為移春檻氷山避暑楊氏子弟毎至伏中取大氷使匠琢為山周圍於宴席間座客雖酒酣而各有寒色亦有挾纊者其驕貴如此也戲擲金錢内庭嬪妃毎至春時各於禁中結伴三人至五人擲金錢為戲蓋孤悶無所遣也射團宫中毎到端午節造粉團角黍貯於金盤中以小角造弓子纎妙可愛架箭射盤中粉團中者得食蓋粉團滑膩而難食也都中盛於此戲探官都中毎至正月十五日造麵璽以官位帖子卜官位高下或賭筵宴以為戲笑撤去燈燭蘇頲與李乂對掌文誥𤣥宗顧念之深也八月十五夜於禁中直宿諸學士翫月備文酒之宴時長天無雲月色如晝蘇曰清光可愛何用燈燭遂使撤去刀槍自鳴武庫中刀槍自鳴識者以為不祥之兆後果有禄山之亂大駕西幸之應也富窟王元寶都中巨豪也常以金銀疊為屋壁上以紅泥泥之於宅中置一禮賢室以沉檀為軒檻以碔砆甃地面以錦文石為柱礎又以銅線穿錢甃於後園花徑中貴其泥雨不滑也四方賔客所至如歸故時人呼為王家富窟牀畔香童元寶好賔客務於華侈器玩服用僭於王公而四方之士盡歸而仰焉常於寢帳牀前雕矮童二人捧七寶博山爐自暝焚香徹曉其驕貴如此龍皮扇元寶家有一皮扇子製作甚質毎暑月宴客即以此扇子置於坐前使新水灑之則颯然風生巡酒之間客有寒色遂命徹去明皇亦嘗差中使去取看愛而不受帝曰此龍皮扇子也夢筆頭生花李太白少時夢所用之筆頭上生花後天才贍逸名聞天下醒酒花明皇與貴妃幸華清宫因宿酒初醒凭妃子肩同看木芍藥上親折一枝與妃子遞嗅其艶帝曰不惟萱草忘憂此花香艶尤能醒酒蛛絲卜巧帝與貴妃毎至七月七日夜在華清宫遊宴時宫女軰陳𤓰花酒饌列於庭中求恩於牽牛織女星也又各捉蜘蛛於小合中至曉開視蛛網稀密以為得巧之候密者言巧多稀者言巧少民間亦效之夜明杖𨼆士郭休有一拄杖色如朱染叩之則有聲毎出處遇夜則此杖有光可照十步之内登危陟險未嘗足失則杖之力焉開元天寶遺事巻二
