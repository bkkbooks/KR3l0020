body:
  text: 開元天寶遺事巻一蜀王仁裕撰玉有太平字開元元年内中因雨過地潤㣲裂至夜有光宿衛者記其處所曉乃奏之上令鑿其地得寶玉一片如拍板様上有古天下太平字百僚稱賀收之内庫步輦召學士明皇在便殿甚思姚元崇論時務七月十五日苦雨不止泥濘盈尺上令侍御者擡步輦召學士來時元崇為翰林學士中外榮之自古急賢待士帝王如此者未之有也賜筯表直宋璟為宰相朝野人心歸美焉時春御宴帝以所用金筯令内臣賜璟雖受所賜莫知其由未敢陳謝帝曰所賜之物非賜汝金蓋賜卿之筯表卿之直也璟遂下殿拜謝截鐙留鞭姚元崇初牧荆州三年受代日闔境民吏泣擁馬首遮道不使去所乘之馬鞭鐙民皆截留之以表瞻戀新牧具其事奏之詔褒美焉就賜中金一千兩慙顔厚如甲進士楊光逺惟多矯飾不識忌諱遊謁王公之門干索權豪之族未嘗自足稍有不從便多誹謗常遭有勢撻辱畧無改悔時人多鄙之皆曰楊光逺慙顔厚如十重鐵甲也七寶山座明皇於勤政樓以七寶裝成山座髙七尺召諸學士講議經㫖及時務勝者得升焉惟張九齡論辨風生升此座餘人不可階也時論美之癡賢右拾遺張方回精神不爽時人呼為癡漢子毎朝政有失便抗疏論之精彩昻然進不懼死明皇嘗謂右拾遺張方回忠賢人也蜂蝶相隨都中名姬楚蓮香者國色無雙時貴門子弟争相詣之蓮香毎出處之間則蜂蝶相隨蓋慕其香也掃雪迎賔巨豪王元寶毎至冬月大雪之際令僕夫自本家坊巷口掃雪為徑路躬親立於坊巷前迎揖賔客就本家具酒炙宴樂之為暖寒之㑹夢虎之妖周象者好畋獵後為汾陽令忽夢一乳虎相逼驚而睡覺因兹染疾後有僧海寧者因過象門謂隣叟曰此居有妖氣乆則不可救也隣叟遂聞於象象召僧令視之僧曰當與君禳之遂擇日設壇持劒禹步誦咒自大門而入至於寢所繞患人數徧而叱之忽於牀下作一虎聲家人悉驚奔散周象亦不覺投牀下伏死於地僧以水噀之須臾如故記事珠開元中張説為宰相有人惠説二珠紺色有光名曰記事珠或有闕忘之事則以手持弄此珠便覺心神開悟事無巨細渙然明曉一無所忘説祕而至寶也遊仙枕龜兹國進奉枕一枚其色如瑪瑙温温如玉其製作甚樸素若枕之則十洲三島四海五湖盡在夢中所見帝因立名為遊仙枕後賜與楊國忠隨蝶所幸開元末明皇毎至春月旦暮宴於宫中使妃嬪軰争揷艶花帝親捉粉蝶放之隨蝶所止幸之後因楊妃專寵遂不復此戲也記惡碑盧奐累任大郡皆顯治聲所至之處畏如神明或有無良惡跡之人必行嚴斷仍以所犯之罪刻石立本人門首再犯處於極刑民間畏懼絶無犯法者明皇知其能官賜中金五十兩璽詔褒諭焉故民間呼其石為記惡碑自暖盃内庫有一酒盃青色而有紋如亂絲其薄如紙於盃足上有縷金字名曰自暖盃上令取酒注之温温然有氣相次如沸湯遂收於内藏辟寒犀開元二年冬至交趾國進犀一株色黄如金使者請以金盤置于殿中温温然有暖氣襲人上問其故使者對曰此辟寒犀也頃自隋文帝時本國曾進一株直至今日上甚悦厚賜之傳書鴿張九齡少年時家養羣鴿毎與親知書信徃來只以書繫鴿足上依所寄之處飛徃投之九齡目之為飛奴時人無不愛説牽紅絲娶婦郭元振少時美風姿有才藝宰相張嘉正欲納為壻元振曰知公門下有女五人未知孰陋事不可倉卒更待忖之張曰吾女各有姿色即不知誰是匹偶以子風骨竒秀非常人也吾欲令五女各持一絲幔前使子取便牽之得者為婚元振欣然從命遂牽一紅絲線得第三女大有姿色後果然隨夫貴達也豪友長安富民王元寶楊崇義郭萬金等國中巨豪也各以延納四方多士競於供送朝之名寮徃徃出於門下毎科場文士集於數家時人目之為豪友喚鐵太白山有隐士郭休字退夫有運氣絶粒之術於山中建茅屋百餘間有白雲亭鍊丹洞注易亭修真亭朝元壇集神閣毎於白雲亭與賔客看山禽野獸即以槌擊一鐵片子其聲清響山中鳥獸聞之集於亭下呼為喚鐵鸚鵡告事長安城中有豪民楊崇義者家富數世服玩之屬僭於王公崇義妻劉氏有國色與隣舍兒李弇私通情甚於夫遂有意欲害崇義忽一日醉歸寢於室中劉氏與李弇同謀而害之埋於枯井中其時僕妾軰並無所覺惟有鸚鵡一隻在堂前架上洎殺崇義之後其妻却令童僕四散尋覓其夫遂經府陳詞言其夫不歸竊慮為人所害府縣官吏日夜捕賊涉疑之人及童僕軰經拷捶者百數人莫究其弊後來縣官等再詣崇義家撿挍其架上鸚鵡忽然聲屈縣官遂取於臂上因問其故鸚鵡曰殺家主者劉氏李弇也官吏等遂執縛劉氏及捕李弇下獄備招情欵府尹具事案奏聞明皇嘆訝乆之其劉氏李弇依刑處死封鸚鵡為緑衣使者付後宫養餵張説後為緑衣使者傳好事者傳之瑞炭西涼國進炭百條各長尺餘其炭青色堅硬如鐵名之曰瑞炭燒於爐中無焰而有光毎條可燒十日其熱氣迫人而不可近也敲冰煮茗逸人王休居太白山下日與僧道異人徃還毎至冬時取溪冰敲其晶瑩者煮建茗共賔客飲之物外之遊王休髙尚不親勢利常與名僧數人或跨驢或騎牛尋訪山水自謂結物外之遊花妖初有木芍藥植於沉香亭前其花一日忽開一枝兩頭朝則深紅午則深碧暮則深黄夜則粉白晝夜之内香艶各異帝謂左右曰此花木之妖不足訝也花上金鈴天寶初寧王日侍好聲樂風流藴藉諸王弗如也至春時於後園中紉紅絲為繩密綴金鈴繫於花梢之上毎有鳥鵲翔集則令園吏掣鈴索以驚之蓋惜花之故也諸宫皆效之妖燭寜王好聲色有人獻燭百炬似臘而􅕹似脂而硬不知何物所造也毎至夜筵賔妓間坐酒酣作狂其燭則昏昏然如物所掩罷則復明矣莫測其怪也七寶硯鑪内庫中有七寶硯鑪一所曲盡其功毎至冬寒硯凍置於鑪上硯氷自消不勞置火冬月帝常用之夢玉鷰投懐張説母夢有一玉鷰自東南飛來投入懐中而有孕生説果為宰相其至貴之祥也饞魚燈南中有魚肉少而脂多彼中人取魚脂煉為油或將照紡織機杼則暗而不明或使照筵宴造飲食則分外光明時人號為饞魚燈助嬌花御苑新有千葉桃花帝親折一枝插於妃子寶冠上曰此箇花尤能助嬌態也照病鏡葉法善有一鐵鏡鑑物如水人每有疾病以鏡照之盡見臓腑中所滯之物後以藥療之竟至痊瘥助情花香明皇正寵妃子不視朝政安禄山初承聖睠因進助情花香百粒大小如粳米而色紅毎當寢處之際則含香一粒助情發興筋力不倦帝秘之曰此亦漢之慎䘏膠也眼色媚人念奴者有姿色善歌唱未嘗一日離帝左右毎執板當席顧眄帝謂妃子曰此女妖麗眼色媚人毎囀聲歌㗋則聲出於朝霞之上雖鐘鼓笙竽嘈雜而莫能遏宫妓中帝之鍾愛也開元天寶遺事巻一
