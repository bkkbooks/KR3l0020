  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0020_WYG_003-1a, image: WYG1035/WYG1035-0855c.png}
body:
  text: 開元天寶遺事卷三蜀王仁裕撰郡神迎路張開為荆州刺史至郡界風雨暝晦不辨面目惟聞空中有殿喝之聲相次雲中有衣紫披甲胄者十數人開問其故對曰某荆州內外所主之神久仰使君令名故相率迎引到任謁廟後各致謝及建飾廟貌自此政譽尤善也縣妖破膽李杲遷洛陽令嚴刑峻法民吏畏服縣之積弊杲盡革之踰月之中縣務清簡時有進士劉兼赴舉上都舍於村邸至夜中聞户外街衢中有數人相語曰李令今古正人也吾輩見其行事威猛令人破膽此中不可久居宜遷於他邑可求血食也兼訝其事遂啓門視之寂無影響方知乃邑之妖神也兼遂書贊一首於村邸之壁云狡吏畏威縣妖破膽好録政聲聞於御覽後明皇旌其能賜金百兩及章服焉泥金帖子新進士才及第以泥金書帖子附家書中用報登科之喜至文宗朝遂寢削此儀也喜信新進士每及第以泥金書帖子附於家書中至鄉曲姻戚例以聲樂相慶謂之喜信也被底鴛鴦五月五日明皇避暑遊興慶池與妃子晝寢於水殿中宫嬪輩憑欄倚檻爭看雌雄二鸂鶒戲於水中帝時擁貴妃於綃帳內謂宫嬪曰爾等愛水中鸂鶒爭如我被底鴛鴦半仙之戲天寶宫中至寒食節競豎鞦韆令宫嬪輩戲笑以為宴樂帝呼為半仙之戲都中士民因而呼之相風旌五王宫中各於庭中豎長杆掛五色旌於杆頭旌之四垂綴以小金鈴有聲即使侍從者視旌之所向可以知四方之風候也占雨石學士蘇頲有一錦紋花石鏤為筆架置於硯席間每天欲雨即此石架津出如汗逡巡而雨以此常為雨候固無差矣向火乞兒張九齡見朝之文武僚屬趨附楊國忠爭求富貴惟九齡未嘗及門楊甚銜之九齡嘗與識者議曰今時之朝彥皆是向火乞兒一旦火盡灰冷暖氣何在當凍尸裂體棄骨於溝壑中禍不逺矣果然因祿山之亂附炎者皆罪纍族滅不可勝數九齡之先見信夫神智博達也向火言附炎也結棚避暑長安富家子劉逸李間衛曠家世巨豪而好接待四方之士疏財重義有難必救真慷慨之士人皆歸仰焉每至暑伏中各於林亭內植畫柱以錦綺結為凉棚設坐具召長安名妓間坐遞相延請為避暑之㑹時人無不愛美也氷筯冬至日大雪至午雪霽有晴色因寒所結􅉉溜皆為氷條妃子使侍兒敲下二條看玩帝自晚朝視政回問妃子曰所玩何物耶妃子笑而答曰妾所玩者氷筯也帝謂左右曰妃子聰慧此象可愛也雞聲斷愛長安名妓劉國容有姿色能吟詩與進士郭昭述相愛他人莫敢窺也後昭述釋褐授天長簿遂與國容相别詰旦赴任行至咸陽國容使一女僕馳矮駒齎短書云歡寢方濃恨雞聲之斷愛恩憐未洽歎馬足以無情使我勞心因君減食再期後㑹以結齊眉長安子弟多誦諷焉占風鐸岐王宫中於竹林內懸碎玉片子每夜聞玉片子相觸之聲即知有風號為占風鐸山猿報時商山𨼆士髙太素纍徴不起在山中搆道院二十餘間太素起居清心亭下皆茂林秀竹竒花異卉每至一時即有猿一枚詣亭前鞠躬而啼不易其候太素因目之為報時猿其性度有如此遊蓋飄青雲長安春時盛於遊賞園林樹木無閒地故學士蘇頲應制云飛埃結紅霧遊蓋飄青雲帝覽之嘉賞馬遂以御花親插頲之巾上時人榮之紅氷楊貴妃初承恩召與父母相别泣涕登車時天寒淚結為紅氷投錢賭寢明皇未得妃子宫中嬪妃輩投金錢賭侍帝寢以親者為勝召入妃子遂罷此戲精神頓生明皇每朝政有闕則虛懷納諫大開士路早朝百辟趨班帝見張九齡風威秀整異於衆僚謂左右曰朕每見九齡使我精神頓生口案張九齡纍歷刑獄之司無所不察每有公事赴本司行勘胥吏輩未敢訊劾先取則於九齡囚於前面分曲直口撰案卷囚無輕重咸樂其罪時人謂之張公口案言刑燕公說有宰輔之才而多詭詐復貪財賄時亦多之亦汙之每中書議事及衆僚巡㕔或有所忤立便叱罵為衆所嫌故朝彥相謂曰張公之言毒於極刑言好面辱人也銷魂橋長安東灞陵有橋來迎去送皆至此橋為離别之地故人呼之為銷魂橋逐惡如驅蚊蚋𡊮光庭纍典名藩皆有異政明皇謂宰輔曰𡊮光庭性逐惡如扇驅蚊蚋歇馬杯長安自昭應縣至都門官道左右村店之民當大路市酒量錢數多少飲之亦有施者與行人解之故路人號為歇馬杯吹火照書蘇頲少不得父意常與僕夫雜處而好學不倦每欲讀書又患無燈燭常於馬廏竈中旋吹火光照書誦焉其苦學如此後至相位金牌斷酒安祿山受帝眷愛常與妃子同食無所不至帝恐外人以酒毒之遂賜金牌子繫於臂上每有王公召宴欲沃以巨觥祿山即以牌示之云准敕斷酒文陳雄帥張九齡常覽蘇頲文卷謂同僚曰蘇生之俊贍無敵真文陳之雄帥也射飛毛羽林將劉洪喜騎射常對御使人於風中擲鵝毛洪連箭射之無有不中帝賞歎厚賜焉淚粧宫中嬪妃輩施素粉於兩頰相號為淚粧識者以為不祥後有祿山之亂索鬭雞李林甫為性狠狡不得士心每有所行之事多不協羣議而面無和氣國人謂林甫精神剛戾常如索鬭雞肉陳楊國忠於冬月常選婢妾肥大者行列於前令遮風蓋藉人之氣相暖故謂之肉陳傳書燕長安豪民郭行先有女子紹蘭適巨商任宗為賈於湘中數年不歸復音書不達紹蘭目覩堂中有雙燕戲於梁間蘭長吁而語於燕曰我聞燕子自海東來往復必徑由於湘中我壻離家不歸數嵗蔑有音耗生死存亡弗可知也欲慿爾附書投於我壻言訖淚下燕子飛鳴上下似有所諾蘭復問曰爾若相允當泊我懷中燕遂飛於膝上蘭遂吟詩一首云我壻去重湖臨窗泣血書殷勤憑燕翼寄與薄情夫蘭遂小書其字繫於足上燕遂飛鳴而去任宗時在荆州忽見一燕飛鳴於頭上宗訝視之燕遂泊於肩上見有一小封書繫在足上宗解而視之乃妻所寄之詩宗感而泣下燕復飛鳴而去宗次年歸首出詩示蘭後文士張說傳其事而好事者寫之燈婢寧王宫中每夜於帳前羅列木雕矮婢飾以彩繪各執華燈自昏達旦故目之為燈婢解語花明皇秋八月太液池有千葉白蓮數枝盛開帝與貴戚宴賞焉左右皆歎羡久之帝指貴妃示於左右曰爭如我解語花油幕長安貴家子弟每至春時遊宴供帳於園圃中隨行載以油幕或遇隂雨以幕覆之盡歡而歸鬭花長安士女於春時鬭花戴插以竒花多者為勝皆用千金市名花植於庭苑中以備春時之鬭也裙幄長安士女遊春野步遇名花則設席藉草以紅裙遞相插掛以為宴幄其奢逸如此也鳳炭楊國忠家以炭屑用蜜捏塑成雙鳳至冬月則燃於爐中及先以白檀木鋪於爐底餘灰不可參雜也開元天寶遺事卷三
